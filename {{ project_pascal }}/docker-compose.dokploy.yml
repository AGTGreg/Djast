# =============================================================================
# Dokploy Deployment
# =============================================================================
# This compose file is designed for deployment via Dokploy.
# Traefik (managed by Dokploy) handles SSL and domain routing.
# Nginx handles static files, security headers, compression, and proxying.
#
# Traffic flow:
#   Traefik (SSL, domain) -> Nginx (static files, headers, proxy) -> Granian (app)
#
# What Dokploy handles (configure via dashboard):
#   - Domain name assignment
#   - SSL/TLS certificates (Let's Encrypt, automatic renewal)
#   - HTTPS redirect
#
# What Nginx handles (no overlap with Traefik):
#   - Static and media file serving
#   - Security headers (HSTS, X-Frame-Options, etc.)
#   - Gzip compression
#   - WebSocket / SSE proxying
#
# Setup:
#   1. Create a new Docker Compose project in Dokploy
#   2. Paste or link this compose file
#   3. Add your prod.env variables in Dokploy's environment settings
#   4. Set the domain for the "nginx" service in Dokploy (port 80)
#   5. Enable Let's Encrypt SSL in Dokploy's domain settings
#   6. Deploy
# =============================================================================

services:

  db:
    image: "postgres:17-alpine"
    expose:
      - "5432"
    env_file:
      - prod.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djast} -d ${POSTGRES_DB:-djast}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: "redis:8.0-alpine"
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build:
      context: ./app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    env_file:
      - prod.env
    volumes:
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  taskiq-worker:
    build:
      context: ./app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - prod.env
    volumes:
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    command: ["taskiq", "worker", "djast.taskiq:broker", "djast.tasks"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  taskiq-scheduler:
    build:
      context: ./app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - prod.env
    volumes:
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    command: ["taskiq", "scheduler", "djast.scheduler:scheduler"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: "nginx:1.27-alpine"
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.dokploy.conf:/etc/nginx/conf.d/default.conf:ro
      - app_static:/vol/app/static:ro
      - app_media:/vol/app/media:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  redis_data:
  app_static:
  app_media:
  app_logs:
