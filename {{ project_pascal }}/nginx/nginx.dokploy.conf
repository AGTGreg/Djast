map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream app {
    server app:8000;
}

# HTTP only — Traefik (managed by Dokploy) handles SSL termination.
# No HTTPS server block needed.
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Max upload size
    client_max_body_size 10M;

    # Static files — served directly by Nginx
    location /static/ {
        alias /vol/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /vol/app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Default proxy to the app
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through Traefik's X-Forwarded-Proto (the original client
        # protocol) instead of $scheme, which would be "http" since
        # Traefik forwards to Nginx over plain HTTP.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # SSE support — disable buffering so events stream immediately.
        # For endpoints that return text/event-stream, the backend should
        # also send X-Accel-Buffering: no for per-response control.
        proxy_buffering off;
        proxy_cache off;
    }
}
