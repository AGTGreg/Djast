services:

  db:
    image: "postgres:17-alpine"
    expose:
      - "5432"
    env_file:
      - dev.env
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: "redis:8.0-alpine"
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build:
      context: ./app
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    ports:
      - "8001:8000"
    env_file:
      - dev.env
    command: [ "fastapi", "dev", "main.py", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    # To test with Granian (production server), comment out the line above and uncomment below:
    # command: ["granian", "main:app", "--interface", "asgi", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  taskiq-worker:
    build:
      context: ./app
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    env_file:
      - dev.env
    command: ["taskiq", "worker", "djast.taskiq:broker", "djast.tasks"]

  taskiq-scheduler:
    build:
      context: ./app
    depends_on:
      - db
      - redis
    volumes:
      - ./app:/app
      - app_static:/vol/app/static
      - app_media:/vol/app/media
      - app_logs:/vol/app/logs
    env_file:
      - dev.env
    command: ["taskiq", "scheduler", "djast.scheduler:scheduler"]

volumes:
  app_static:
  app_media:
  app_logs:
  db_data:
  redis_data: